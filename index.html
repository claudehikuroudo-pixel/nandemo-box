<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#f6f6f8" />
<title>なんでも箱</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', sans-serif;
    background: radial-gradient(circle at 20% 10%,#ffe8f0 0%,transparent 45%),
                radial-gradient(circle at 85% 25%,#e8f0ff 0%,transparent 50%),
                radial-gradient(circle at 50% 90%,#fff0e0 0%,transparent 45%),#f5f5f7;
  }
  #root { min-height: 100vh; min-height: 100dvh; }
  textarea, input, button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  /* ===== スキャン演出（AI解析のシグネチャー） ===== */
  @keyframes nbScan {              /* 一発スイープ（カードの画像検索用） */
    0%   { top: -3px; opacity: 1; }
    80%  { opacity: 1; }
    100% { top: 105%; opacity: 0; }
  }
  @keyframes nbBeam {              /* ループするレーザー掃引（解析中） */
    0%   { transform: translateY(-12%); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { transform: translateY(112%); opacity: 0; }
  }
  @keyframes nbTrail {             /* 掃引済みエリアが光る余韻 */
    0%   { transform: translateY(-100%); opacity: 0; }
    12%  { opacity: 0.9; }
    100% { transform: translateY(12%); opacity: 0; }
  }
  @keyframes nbSparkle {
    0%   { transform: scale(0) rotate(0deg);    opacity: 0; }
    30%  { transform: scale(1.7) rotate(50deg);  opacity: 1; }
    70%  { transform: scale(1.1) rotate(120deg); opacity: 0.85; }
    100% { transform: scale(0) rotate(190deg);   opacity: 0; }
  }
  @keyframes nbRipple {
    0%   { transform: scale(0.2); opacity: 1; }
    100% { transform: scale(3.6); opacity: 0; }
  }
  @keyframes nbFlash {
    0%   { opacity: 0; }
    30%  { opacity: 0.75; }
    100% { opacity: 0; }
  }
  @keyframes nbGrid {
    0%   { opacity: 0; transform: scale(1.15); }
    25%  { opacity: 0.5; }
    100% { opacity: 0; transform: scale(1); }
  }
  @keyframes nbGridLoop {          /* 解析中は薄く息づくメッシュ */
    0%,100% { opacity: 0.14; }
    50%     { opacity: 0.34; }
  }
  @keyframes nbBracket {           /* 四隅のロックオン（照準） */
    0%   { opacity: 0; transform: scale(1.45); }
    55%  { opacity: 1; }
    100% { opacity: 0.95; transform: scale(1); }
  }
  @keyframes nbRadar {             /* レーダーの円錐スイープ */
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  @keyframes nbHud {               /* HUD文字のパルス */
    0%,100% { opacity: 0.55; }
    50%     { opacity: 1; }
  }
  @keyframes nbTraceMove {         /* 輪郭を走る光の帯（枠を一周） */
    from { stroke-dashoffset: 0; }
    to   { stroke-dashoffset: -400; }
  }
  @keyframes nbConverge {          /* 光の点が中心へ収束 */
    0%   { transform: translate(var(--sx), var(--sy)) scale(1); opacity: 0; }
    22%  { opacity: 1; }
    100% { transform: translate(0, 0) scale(0.2); opacity: 0; }
  }
  @keyframes nbReco {              /* 「認識できた！」の締めフラッシュ */
    0%, 66% { opacity: 0; }
    80%     { opacity: 0.85; }
    100%    { opacity: 0; }
  }
  @keyframes nbPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(80,200,255,0.6); }
    50%      { box-shadow: 0 0 0 8px rgba(80,200,255,0); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script>
  // ブラウザ単体で動かすため、JSX変換を classic runtime（React.createElement）に固定。
  // 既定の automatic runtime は import 文を注入してしまい単体ページで動かないため。
  Babel.registerPreset('classic-react', { presets: [[Babel.availablePresets['react'], { runtime: 'classic' }]] });
</script>

<script type="text/babel" data-presets="classic-react">
const { useState, useRef, useEffect } = React;

// 仕分けに使うモデル（安いHaikuを既定に。精度を上げたいときは画面の設定から変更可）
const DEFAULT_MODEL = "claude-haiku-4-5-20251001";

// ── カテゴリ定義 ──
const CATS = {
  event: { label: "予定", en: "Event", grad: "linear-gradient(145deg,#ff6b9d,#ff8f6b)", chip: "rgba(255,94,138,0.13)", chipC: "#f0436c", dot: "#ff5e8a" },
  task:  { label: "タスク", en: "Task", grad: "linear-gradient(145deg,#a06bff,#6b8bff)", chip: "rgba(155,107,255,0.13)", chipC: "#8b54f5", dot: "#9b6bff" },
  mono:  { label: "モノ", en: "Want", grad: "linear-gradient(145deg,#ffc247,#ff9a3d)", chip: "rgba(255,182,39,0.16)", chipC: "#d18908", dot: "#ffb627" },
  basho: { label: "行ってみたい", en: "Place", grad: "linear-gradient(145deg,#3fe08a,#1fc8b0)", chip: "rgba(47,216,122,0.14)", chipC: "#1aa85c", dot: "#2fd87a" },
  joho:  { label: "情報", en: "Info", grad: "linear-gradient(145deg,#47bfff,#6b9aff)", chip: "rgba(55,182,255,0.14)", chipC: "#1690d8", dot: "#37b6ff" },
  recipe:{ label: "レシピ", en: "Recipe", grad: "linear-gradient(145deg,#ff9068,#ff5e62)", chip: "rgba(255,94,98,0.14)", chipC: "#e0483f", dot: "#ff6b5c" },
  news:  { label: "ニュース", en: "News", grad: "linear-gradient(145deg,#64748b,#475569)", chip: "rgba(100,116,139,0.15)", chipC: "#475569", dot: "#64748b" },
  kyomi: { label: "興味ある", en: "Interest", grad: "linear-gradient(145deg,#e879f9,#c026d3)", chip: "rgba(217,70,239,0.13)", chipC: "#c026d3", dot: "#d946ef" },
};

// ── 初期サンプル（初回だけ表示。一度使い始めると保存内容に置き換わる）──
const SEED = [
  { id: 1, category: "event", title: "オンライン勉強会 見逃し配信", meta: "オンライン・期間限定", chip: "期限を確認" },
  { id: 2, category: "mono", title: "G-SHOCK GW-B5600", meta: "", chip: "¥28,600" },
  { id: 3, category: "task", title: "請求書を送る", meta: "", chip: "今週中" },
  { id: 4, category: "basho", title: "気になる角打ちバー", meta: "渋谷・徒歩5分", chip: "行きたい" },
  { id: 5, category: "joho", title: "AI活用術のまとめ記事", meta: "あとで読む", chip: "" },
];

// ── localStorage 保存ヘルパー ──
const LS_ITEMS = "nb_items_v1";
const LS_KEY = "nb_apikey";
const LS_MODEL = "nb_model";

function extractUrl(text) {
  const m = text && text.match(/https?:\/\/[^\s]+/);
  return m ? m[0].replace(/[.,)】」』>]+$/, "") : null;
}
function toDateStr(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}

function compressImage(dataUrl) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const maxW = 600;
      const scale = Math.min(1, maxW / img.width);
      const c = document.createElement('canvas');
      c.width = Math.round(img.width * scale);
      c.height = Math.round(img.height * scale);
      c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
      resolve(c.toDataURL('image/jpeg', 0.45));
    };
    img.src = dataUrl;
    img.onerror = () => resolve(dataUrl);
  });
}

function loadItems() {
  try {
    const raw = localStorage.getItem(LS_ITEMS);
    if (!raw) return SEED;
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : SEED;
  } catch (e) { return SEED; }
}
function saveItems(items) {
  try {
    localStorage.setItem(LS_ITEMS, JSON.stringify(items));
  } catch (e) {
    // 容量オーバー時は_imgだけ除いて再試行
    try {
      const slim = items.map(({ _img, ...rest }) => rest);
      localStorage.setItem(LS_ITEMS, JSON.stringify(slim));
    } catch (e2) { /* 諦める */ }
  }
}

// ── IndexedDB（"消えない箱"の主保存。localStorage(~5MB)は画像で溢れる＝サムネ消失の原因。IDBは数百MB＆消えにくい）──
const IDB_NAME = "nandemo-box", IDB_STORE = "kv", IDB_ITEMS_KEY = "items";
function idbOpen() {
  return new Promise((resolve, reject) => {
    let req;
    try { req = indexedDB.open(IDB_NAME, 1); } catch (e) { reject(e); return; }
    req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
function idbGetItems() {
  return idbOpen().then(db => new Promise((resolve, reject) => {
    const r = db.transaction(IDB_STORE, "readonly").objectStore(IDB_STORE).get(IDB_ITEMS_KEY);
    r.onsuccess = () => resolve(r.result);
    r.onerror = () => reject(r.error);
  }));
}
function idbSetItems(items) {
  return idbOpen().then(db => new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, "readwrite");
    tx.objectStore(IDB_STORE).put(items, IDB_ITEMS_KEY);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  }));
}

// ── スキャン演出（AI解析のシグネチャー体験・C＋D型） ──
// C＝輪郭トレース：被写体のフチを光がなぞる＝「AIが中身を認識してる」を絵にする（このアプリの核）
// D＝パーティクル収束→認識フラッシュ：光の点が中心に集まり「認識できた！」で締める
// loop=true：解析中ずっと繰り返す（時間可変のAPI待ち向け）／loop=false：一回で締める（カードの画像検索）
function ScanFX({ loop }) {
  const rep      = loop ? "infinite" : "forwards";
  const traceDur = loop ? "2.0s"     : "0.85s";
  const cycleDur = loop ? "1.7s"     : "0.85s";
  // 中心へ収束する光の点（開始オフセットを円状に配置）
  const DOTS = Array.from({length: 12}, (_, i) => {
    const a = (i / 12) * Math.PI * 2, r = 62 + ((i * 13) % 26);
    return { sx: `${Math.round(Math.cos(a) * r)}px`, sy: `${Math.round(Math.sin(a) * r)}px`, d: (i % 6) * 90 };
  });
  return (
    <div style={S.scanOverlay}>
      {/* C：輪郭トレース（薄い枠＋走る光の帯） */}
      <svg style={S.scanTraceSvg} viewBox="0 0 100 100" preserveAspectRatio="none">
        <rect x="2" y="2" width="96" height="96" rx="7" vectorEffect="non-scaling-stroke" style={S.scanTraceBase}/>
        <rect x="2" y="2" width="96" height="96" rx="7" vectorEffect="non-scaling-stroke"
              style={{...S.scanTraceLit, animation:`nbTraceMove ${traceDur} linear ${rep}`}}/>
      </svg>
      {/* D：パーティクル収束 */}
      {DOTS.map((p, i) => (
        <div key={i} style={{...S.scanDot, "--sx":p.sx, "--sy":p.sy,
          animation:`nbConverge ${cycleDur} ease-in ${rep}`, animationDelay:`${p.d}ms`}}/>
      ))}
      {/* 認識できた！のフラッシュ */}
      <div style={{...S.scanReco, animation:`nbReco ${cycleDur} ease-in ${rep}`}}/>
      {!loop && <div style={S.scanRipple}/>}
    </div>
  );
}

function App() {
  const [items, setItems] = useState(null); // null = IndexedDB読込中
  const [filter, setFilter] = useState("all");
  const [sort, setSort] = useState("new");
  const [sheet, setSheet] = useState(false);
  const [input, setInput] = useState("");
  const [busy, setBusy] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState("");
  const [image, setImage] = useState(null);
  const [menuId, setMenuId] = useState(null);
  const [lightbox, setLightbox] = useState(null);
  const [resultDate, setResultDate] = useState(()=>toDateStr(new Date()));
  const [scanning, setScanning] = useState(null);
  const [askOpen, setAskOpen] = useState(false);
  const [askInput, setAskInput] = useState("");
  const [askBusy, setAskBusy] = useState(false);
  const [askAnswer, setAskAnswer] = useState("");
  const [askHits, setAskHits] = useState([]); // 答えに該当したカードid（行動ボタン付きで表示）
  const [planId, setPlanId] = useState(null); // 「予定に入れる」中のカードid
  const [planDate, setPlanDate] = useState(()=>toDateStr(new Date()));
  // スケジュール追加（日付タップ→時刻＋やること/タスク）
  const [addDay, setAddDay] = useState(null); // タップした日付(YYYY-MM-DD)
  const [selDay, setSelDay] = useState(()=>toDateStr(new Date())); // カレンダーで選択中の日
  const [showAllTasks, setShowAllTasks] = useState(false); // やること一覧を全部見る
  const [showDone, setShowDone] = useState(false); // 完了タスクの折りたたみ
  const [pendingPlace, setPendingPlace] = useState(""); // 撮影時に取得中/取得した場所名
  const [weekendHide, setWeekendHide] = useState(()=>{ try{return localStorage.getItem("nb_weekend_dismissed")===toDateStr(new Date());}catch(e){return false;} }); // 週末そっと提案を「また今度」で今日は非表示
  const [addTitle, setAddTitle] = useState("");
  const [addType, setAddType] = useState("event"); // event=予定 / task=タスク
  const [addTime, setAddTime] = useState("");
  const [addRemind, setAddRemind] = useState(false);
  const notifiedRef = useRef(new Set()); // 通知済みidを記録（重複通知防止）
  const fileRef = useRef(null);
  const cameraRef = useRef(null); // 直行カメラ用input
  const pendingGeoRef = useRef(null); // 撮影時の位置情報 {lat,lng,place} を次のconfirmAddで付与
  const loadedRef = useRef(false);
  const calScrollRef = useRef(null);
  const nextId = useRef(Date.now());
  const today = (() => { const d = new Date(); d.setHours(0,0,0,0); return d; })();
  // calBase = 現在の週の日曜日の2週前（ページ0の起点）
  const calBase = (() => { const d = new Date(today); d.setDate(d.getDate()-d.getDay()-14); return d; })();

  // 設定（APIキー）
  const [apiKey, setApiKey] = useState(() => localStorage.getItem(LS_KEY) || "");
  const [model, setModel] = useState(() => localStorage.getItem(LS_MODEL) || DEFAULT_MODEL);
  const [settings, setSettings] = useState(false);
  const [keyDraft, setKeyDraft] = useState("");
  const [calPageIdx, setCalPageIdx] = useState(1);

  // 初回：IndexedDBから読込。無ければ旧localStorageから自動移行。それも無ければSEED。
  useEffect(() => {
    (async () => {
      let data = null;
      try { data = await idbGetItems(); } catch (e) { /* IDB不可の環境 */ }
      if (!Array.isArray(data)) data = loadItems(); // 旧localStorageのデータ or SEED
      setItems(data);
      loadedRef.current = true;
    })();
  }, []);
  // items変更をIndexedDBへ永続化（数百MB＝画像を貯めても消えない）。失敗時のみlocalStorageへ退避。
  useEffect(() => {
    if (!loadedRef.current || items == null) return;
    idbSetItems(items).catch(() => saveItems(items));
  }, [items]);
  // リマインド通知：アプリを開いてる/開いた時に、時刻を過ぎた🔔付き予定を通知。
  // ※iOSのPWAは"閉じてても鳴る"にはサーバー(プッシュ)が必要＝今はサーバー無しなので開いてる時のみ。
  useEffect(() => {
    if (!("Notification" in window)) return;
    const check = () => {
      if (Notification.permission !== "granted") return;
      const now = new Date();
      const todayStr = toDateStr(now);
      const hm = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
      (items || []).forEach(it => {
        if (it.remind && it.date === todayStr && it.time && it.time <= hm && !notifiedRef.current.has(it.id)) {
          notifiedRef.current.add(it.id);
          try { new Notification("なんでも箱 ⏰", { body: `${it.time} ${it.title}` }); } catch(e){}
        }
      });
    };
    check();
    const iv = setInterval(check, 30000);
    return () => clearInterval(iv);
  }, [items]);
  // カレンダーを現在の2週間ブロック（ページ1）にスクロール
  useEffect(() => {
    if (calScrollRef.current) {
      calScrollRef.current.scrollLeft = calScrollRef.current.offsetWidth;
    }
  }, []);

  function calGo(dir) {
    const next = Math.max(0, Math.min(5, calPageIdx + dir));
    setCalPageIdx(next);
    if (calScrollRef.current) {
      calScrollRef.current.scrollLeft = calScrollRef.current.offsetWidth * next;
    }
  }
  function openSettings() { setKeyDraft(apiKey); setSettings(true); }
  function saveSettings() {
    const k = keyDraft.trim();
    setApiKey(k);
    localStorage.setItem(LS_KEY, k);
    localStorage.setItem(LS_MODEL, model);
    setSettings(false);
  }

  async function pickImage(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async () => {
      const compressed = await compressImage(reader.result);
      setImage(compressed);
    };
    reader.readAsDataURL(file);
  }

  // 緯度経度→地名（BigDataCloud・無料/キー不要/CORS/日本語）
  async function reverseGeocode(lat, lng) {
    try {
      const r = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=ja`);
      const d = await r.json();
      // 日本では locality=市区町村(港区/鶴見区)が最も分かりやすい。city は都道府県が返ることがある
      return d.locality || d.city || d.principalSubdivision || d.countryName || "";
    } catch (e) { return ""; }
  }

  // 📷 撮る（直行カメラ）→ 撮影時の現在地も取得 → シートを開いてAI仕分けへ
  async function pickCamera(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    pendingGeoRef.current = null; setPendingPlace("");
    // 位置情報を並行取得（許可制。取れなくても写真は入る）
    if (navigator.geolocation) {
      setPendingPlace("📍 場所を取得中…");
      navigator.geolocation.getCurrentPosition(async (pos) => {
        const lat = pos.coords.latitude, lng = pos.coords.longitude;
        const place = await reverseGeocode(lat, lng);
        pendingGeoRef.current = { lat, lng, place };
        setPendingPlace(place ? ("📍 " + place) : "📍 現在地を記録");
      }, () => { pendingGeoRef.current = null; setPendingPlace(""); }, { enableHighAccuracy: true, timeout: 8000 });
    }
    const reader = new FileReader();
    reader.onload = async () => {
      const compressed = await compressImage(reader.result);
      setImage(compressed);
      setSheet(true);
    };
    reader.readAsDataURL(file);
    e.target.value = ""; // 同じ端末で連続撮影できるようリセット
  }

  async function fetchUrlMeta(url) {
    try {
      const res = await fetch(`https://api.microlink.io?url=${encodeURIComponent(url)}&timeout=5000`);
      const data = await res.json();
      if (data.status === "success") {
        return {
          title: data.data.title || "",
          description: data.data.description || "",
          image: data.data.image?.url || "",
          publisher: data.data.publisher || "",
        };
      }
    } catch (e) {}
    return null;
  }

  // URLのページ本文そのものを読む（＝メタだけでなく中身で分類する）。
  // Jina Reader(r.jina.ai)は任意ページを整形テキストで返し、CORSも許可（ブラウザから直接叩ける）。
  // 読めない時（ログイン必須・SPA・SNS投稿・レート制限・タイムアウト）は null → メタ+ドメインにフォールバック。
  async function fetchPageText(url) {
    try {
      const ctrl = new AbortController();
      const to = setTimeout(() => ctrl.abort(), 8000);
      const res = await fetch(`https://r.jina.ai/${url}`, {
        headers: { "X-Return-Format": "text" },
        signal: ctrl.signal,
      });
      clearTimeout(to);
      if (!res.ok) return null;
      let t = (await res.text()).trim();
      if (!t) return null;
      // 分類に必要な冒頭だけ使う（トークン節約）。ナビ等のノイズは冒頭に混じるが本文が続く。
      return t.slice(0, 3500);
    } catch (e) { return null; }
  }

  async function analyze(text, img) {
    if (!apiKey) { setError("先に右上の⚙からAPIキーを設定してください。"); return; }
    setBusy(true); setError(""); setResult(null);
    try {
      const sourceUrl = extractUrl(text);
      let urlMeta = null, pageText = null;
      if (sourceUrl) {
        // メタ情報と本文を同時取得（本文が読めれば分類はほぼそれで決まる）

          const isWeekend = [5,6,0].includes(today.getDay());
          if (!isWeekend || weekendHide || !items) return null;
          const cand = (items || []).filter(it => ["recipe","basho","mono"].includes(it.category) && !it.date && !it.done);
          if (cand.length === 0) return null;
          // 古い方（＝忘れてそうなもの）から、レシピ1・行きたい1を優先で最大2件
          const older = [...cand].reverse();
          const picks = [];
          const recipe = older.find(it => it.category==="recipe");
          const place  = older.find(it => it.category==="basho");
          if (recipe) picks.push(recipe);
          if (place)  picks.push(place);
          for (const it of older) { if (picks.length>=2) break; if (!picks.includes(it)) picks.push(it); }
          const two = picks.slice(0,2);
          if (two.length === 0) return null;
          const openPlan = (it) => {
            const map = { recipe:{type:"task",title:it.title+"を作る"}, basho:{type:"event",title:it.title}, mono:{type:"task",title:it.title+"を見に行く"} };
            const p = map[it.category] || {type:"task", title:it.title};
            setAddDay(toDateStr(new Date())); setAddType(p.type); setAddTitle(p.title); setAddTime(""); setAddRemind(false);
          };
          const invite = (it) => ({ recipe:`🍳 「${it.title}」作ってみる？`, basho:`📍 「${it.title}」行ってみる？`, mono:`🛍 「${it.title}」見に行く？` }[it.category] || `「${it.title}」どうですか？`);
          return (
            <div style={S.wkCard}>
              <div style={S.wkHead}><span>🍃 週末、これどうですか？</span><span style={S.wkDismiss} onClick={()=>{ try{localStorage.setItem("nb_weekend_dismissed", toDateStr(new Date()));}catch(e){} setWeekendHide(true); }}>また今度</span></div>
              {two.map(it => (
                <div key={it.id} style={S.wkRow} onClick={()=>openPlan(it)}>
                  <span style={S.wkInvite}>{invite(it)}</span>
                  <span style={S.wkGo}>＋予定に</span>
                </div>
              ))}
            </div>
          );
        })()}

        {/* 箱に聞く（AIに聞ける＝生活版NotebookLMの核） */}
        <div style={S.askBar} onClick={()=>{setAskOpen(true); setAskAnswer("");}}>
          <span style={S.askBarIcon}>🔮</span>
          <span style={S.askBarText}>箱に聞く（例：この前のレシピ何だっけ？）</span>
        </div>

        <div style={S.boxHeadRow}>
          <span style={S.boxHead}>気になる箱</span>
          <div style={S.sortWrap}>
            {[["new","新しい順"],["old","古い順"],["cat","種類別"]].map(([k,l])=>(
              <span key={k} onClick={()=>setSort(k)} style={{...S.sortBtn, ...(sort===k?S.sortBtnOn:{})}}>{l}</span>
            ))}
          </div>
        </div>
        <div style={S.tabs}>
          {[["all","すべて","#16161e"],["task","タスク",CATS.task.dot],["mono","モノ",CATS.mono.dot],["recipe","レシピ",CATS.recipe.dot],["basho","行ってみたい",CATS.basho.dot],["joho","情報",CATS.joho.dot],["news","ニュース",CATS.news.dot],["kyomi","興味ある",CATS.kyomi.dot],["event","予定",CATS.event.dot]].map(([c,l,col])=>(
            <div key={c} onClick={()=>setFilter(c)}
              style={{...S.tab, ...(filter===c?{...S.tabOn, background: c==="all"?"linear-gradient(120deg,#16161e,#3a3a4e)":CATS[c]?CATS[c].grad:"#16161e"}:{})}}>
              <span style={{...S.tabDot, background: filter===c?"#fff":col}}/>
              <span style={{...S.tabLbl, ...(filter===c?{color:"#fff"}:{})}}>{l}</span>
            </div>
          ))}
        </div>

        <div style={S.wall}>
          {visible.map((it)=>{
            const c = CATS[it.category];
            const heroImg = it._img || it.image;
            return (
              <div key={it.id} style={S.card}>
                <div style={S.cardMenuBtn} onClick={e=>{e.stopPropagation(); setMenuId(menuId===it.id?null:it.id);}}>⋮</div>
                <div style={{...S.hero, background:c.grad, ...(heroImg&&it.sourceUrl?{cursor:"pointer"}:{})}}
                  onClick={e => { if(heroImg && it.sourceUrl){ handleImageSearch(e,it); } }}>
                  {heroImg && <img src={heroImg} alt="" style={S.cardHeroImg} onError={e=>{e.target.style.display='none';}} />}
                  <span style={S.heroGlow}/>
                  <span style={S.cardCat}>{c.label}</span>
                  {heroImg && it.sourceUrl && scanning !== it.id && (
                    <span style={S.lensHint}>🔍</span>
                  )}
                  {scanning === it.id && <ScanFX loop={false} />}
                </div>
                <div style={S.cardBody}>
                  <div style={S.cardTitle}>{it.title}</div>
                  {it.meta && <div style={S.cardMeta}>{it.meta}</div>}
                  {it.chip && <span style={{...S.cardChip, background:c.chip, color:c.chipC}}>{it.chip}</span>}
                  {it.category === "basho" && (
                    <a href={`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent([it.title, it.meta].filter(Boolean).join(" "))}`}
                       target="_blank" rel="noopener noreferrer"
                       style={S.cardMapBtn} onClick={e=>e.stopPropagation()}>
                      📍 地図で行く
                    </a>
                  )}
                  {it.sourceUrl && !heroImg && (
                    <a href={it.sourceUrl} target="_blank" rel="noopener noreferrer"
                       style={S.cardLink} onClick={e=>e.stopPropagation()}>
                      {it.searchLabel ? `🔍 ${it.searchLabel}` : "🔗 開く"}
                    </a>
                  )}
                  {(it._img || it.image) && (
                    <div style={S.cardImgBtn} onClick={e=>{e.stopPropagation();setLightbox(it._img || it.image);}}>
                      🔍 画像
                    </div>
                  )}
                  {it.added && <div style={S.cardDate}>📥 {(()=>{const p=it.added.split("-");return `${+p[1]}/${+p[2]}`;})()}</div>}
                </div>
                {menuId===it.id && (
                  <div style={S.menu} onClick={e=>e.stopPropagation()}>
                    <div style={S.menuClose} onClick={()=>setMenuId(null)}>✕</div>
                    <div style={S.menuHint}>分類を変える</div>
                    {Object.entries(CATS).map(([k,v])=>(
                      <div key={k} style={{...S.menuItem, ...(k===it.category?{opacity:0.4}:{})}} onClick={()=>changeCat(it.id,k)}>
                        <span style={{...S.tabDot, background:v.dot}}/>{v.label}{k===it.category && " ✓"}
                      </div>
                    ))}
                    <div style={S.menuDel} onClick={()=>{ if(window.confirm('このカードを削除しますか？')) removeItem(it.id); }}>🗑 削除する</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        <div style={S.dock}>
          <input ref={cameraRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={pickCamera} />
          <div style={S.dockRow}>
            <div style={S.shoot} onClick={()=>cameraRef.current?.click()}>
              <span style={{fontSize:20}}>📷</span><span style={S.shootTxt}>撮る</span>
            </div>
            <div style={{...S.drop, flex:1}} onClick={()=>setSheet(true)}>
              <span style={S.dropPlus}>＋</span><span style={S.dropTxt}>放り込む</span>
            </div>
          </div>
        </div>

        {/* 日付タップ→予定/タスク追加シート */}
        {addDay && (
          <div style={S.sheetWrap} onClick={()=>setAddDay(null)}>
            <div style={S.sheet} onClick={e=>e.stopPropagation()}>
              <div style={S.sheetGrip}/>
              <div style={S.sheetTitle}>📅 {(()=>{const p=addDay.split("-");return `${+p[1]}月${+p[2]}日`;})()} に追加</div>
              <div style={S.sheetSub}>この日の予定・タスクをサッと登録。</div>
              <div style={S.typeToggle}>
                {[["event","📅 予定"],["task","✅ タスク"]].map(([k,l])=>(
                  <div key={k} onClick={()=>setAddType(k)} style={{...S.typeBtn, ...(addType===k?{...S.typeBtnOn, background:CATS[k].grad}:{})}}>{l}</div>
                ))}
              </div>
              <input style={S.dateInput}
                placeholder={addType==="event"?"何の予定？（例：美容院、打合せ）":"やること（例：請求書送る）"}
                value={addTitle} onChange={e=>setAddTitle(e.target.value)} autoFocus />
              <div style={S.addRow}>
                <span style={S.addRowLabel}>⏰ 時刻</span>
                <input type="time" style={S.timeInput} value={addTime} onChange={e=>setAddTime(e.target.value)} />
                <label style={S.remindLabel}>
                  <input type="checkbox" checked={addRemind} onChange={e=>setAddRemind(e.target.checked)} style={{marginRight:5}} />
                  🔔 リマインド
                </label>
              </div>
              <div style={S.sheetBtns}>
                <button style={S.btnGhost} onClick={()=>setAddDay(null)}>やめる</button>
                <button style={{...S.btnMain, ...(!addTitle.trim()?{opacity:0.5}:{})}} onClick={confirmDayAdd} disabled={!addTitle.trim()}>この日に追加 ✓</button>
              </div>
              {addRemind && <div style={S.remindNote}>※通知は「アプリを開いている/開いた時」に出ます。閉じてても鳴る通知は今後サーバー対応で実装予定。</div>}
            </div>
          </div>
        )}

        {/* 箱に聞くシート */}
        {askOpen && (
          <div style={S.sheetWrap} onClick={()=>!askBusy && setAskOpen(false)}>
            <div style={S.sheet} onClick={e=>e.stopPropagation()}>
              <div style={S.sheetGrip}/>
              <div style={S.sheetTitle}>🔮 箱に聞く</div>
              <div style={S.sheetSub}>貯めた中身に、AIが答えます。「あれ何だっけ」を会話で。</div>
              <textarea
                style={S.textarea}
                placeholder="例：この前のレシピ何だっけ？／今週やることある？／行きたいって言ってたバーどこ？"
                value={askInput}
                onChange={e=>setAskInput(e.target.value)}
                disabled={askBusy}
              />
              {askAnswer && (
                <div style={S.askAnswer}>{askAnswer}</div>
              )}
              {/* 答えに該当したカード＝そのまま行動できる（開く/地図/予定に入れる） */}
              {askHits.length > 0 && askHits.map(id => {
                const it = (items || []).find(x => x.id === id);
                if (!it) return null;
                const c = CATS[it.category] || CATS.joho;
                const thumb = it._img || it.image;
                return (
                  <div key={id} style={S.hitCard}>
                    {thumb
                      ? <img src={thumb} alt="" style={S.hitThumb} onError={e=>{e.target.style.display='none';}} />
                      : <div style={{...S.hitThumb, background:c.grad}} />}
                    <div style={{flex:1, minWidth:0}}>
                      <div style={S.hitTitle}>{it.title}</div>
                      <div style={S.hitBtns}>
                        {it.sourceUrl && (
                          <a href={it.sourceUrl} target="_blank" rel="noopener noreferrer" style={S.hitBtn}>🔗 開く</a>
                        )}
                        {it.category === "basho" && (
                          <a href={`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent([it.title, it.meta].filter(Boolean).join(" "))}`}
                             target="_blank" rel="noopener noreferrer" style={{...S.hitBtn, background:"rgba(47,216,122,0.16)", color:"#1aa85c"}}>📍 地図で行く</a>
                        )}
                        {it.date
                          ? <span style={{...S.hitBtn, background:"rgba(120,120,150,0.1)", color:"#8a8a9a", cursor:"default"}}>📅 {(()=>{const p=it.date.split("-");return `${+p[1]}/${+p[2]}`;})()} 予定済み</span>
                          : (planId === id
                            ? <span style={S.hitPlanRow}>
                                <input type="date" style={S.hitDateInput} value={planDate} onChange={e=>setPlanDate(e.target.value)} />
                                <span style={{...S.hitBtn, background:"linear-gradient(120deg,#16161e,#34344a)", color:"#fff"}} onClick={()=>planItem(id, planDate)}>入れる ✓</span>
                              </span>
                            : <span style={{...S.hitBtn, background:"rgba(155,107,255,0.14)", color:"#8b54f5"}} onClick={()=>{setPlanId(id); setPlanDate(toDateStr(new Date()));}}>📅 予定に入れる</span>)}
                      </div>
                    </div>
                  </div>
                );
              })}
              <div style={S.sheetBtns}>
                <button style={S.btnGhost} onClick={()=>setAskOpen(false)} disabled={askBusy}>閉じる</button>
                <button style={{...S.btnMain, ...(askBusy||!askInput.trim()?{opacity:0.5}:{})}}
                  onClick={()=>askBox(askInput)} disabled={askBusy||!askInput.trim()}>
                  {askBusy ? "AIが探し中…" : "聞く →"}
                </button>
              </div>
              {/* ワンタップ想起：状況ボタン＝タップだけでAIが答える（考えさせない） */}
              <div style={S.samples}>
                <div style={S.samplesLabel}>ワンタップで聞く：</div>
                <div style={S.presetWrap}>
                  {["🍳 今晩なに作る？","🚗 週末どこ行く？","✅ 今週やることは？","🛍 気になってた商品は？","📰 あとで読むものある？"].map((s,i)=>(
                    <div key={i} style={S.presetChip}
                      onClick={()=>{ if(askBusy) return; const q=s.replace(/^[^ ]+ /,""); setAskInput(q); askBox(q); }}>
                      {s}
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* 放り込みシート */}
        {sheet && (
          <div style={S.sheetWrap} onClick={()=>!busy && setSheet(false)}>
            <div style={S.sheet} onClick={e=>e.stopPropagation()}>
              <div style={S.sheetGrip}/>
              {busy ? (
                <>
                  <div style={S.sheetTitle}>AIが解析中…</div>
                  <div style={S.sheetSub}>放り込んだ内容を読み取って、ぴったりの箱に仕分けています</div>
                  <div style={S.scanHero}>
                    {image
                      ? <img src={image} alt="" style={S.scanHeroImg} onError={e=>{e.target.style.display='none';}} />
                      : <div style={{position:"absolute",inset:0,padding:"22px 20px",fontSize:14,lineHeight:1.6,color:"rgba(220,235,255,0.92)",fontWeight:600,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:5,WebkitBoxOrient:"vertical"}}>{input || "気になるを解析中"}</div>}
                    {image && <div style={S.scanHeroTint}/>}
                    <div style={S.scanHudMark}>ANALYZING</div>
                    <ScanFX loop={true} />
                    <div style={S.scanHud}>読み取り中…</div>
                  </div>
                </>
              ) : !result ? (
                <>
                  <div style={S.sheetTitle}>気になるを放り込む</div>
                  <div style={S.sheetSub}>URL・テキスト・予定の案内など、何でも貼ってOK</div>
                  <textarea
                    style={S.textarea}
                    placeholder="例：LINEで来たイベント案内を貼り付け、URLを貼る、「渋谷の○○ってバー行きたい」など"
                    value={input}
                    onChange={e=>setInput(e.target.value)}
                    disabled={busy}
                  />
                  <input ref={fileRef} type="file" accept="image/*" style={{display:"none"}} onChange={pickImage} />
                  {!image ? (
                    <div style={S.photoBtn} onClick={()=>fileRef.current?.click()}>
                      <span style={{fontSize:18}}>📷</span>
                      <span>スクショ・写真を放り込む</span>
                    </div>
                  ) : (
                    <div style={S.photoPreview}>
                      <img src={image} alt="" style={S.photoThumb} />
                      <div style={{flex:1}}>
                        <div style={{fontSize:13, fontWeight:700, color:"#1a1a24"}}>写真を放り込みました</div>
                        <div style={{fontSize:11, color:"#9a9aaa", marginTop:2}}>AIが画像を読み取ります</div>
                        {pendingPlace && <div style={{fontSize:11, fontWeight:800, color:"#1690d8", marginTop:3}}>{pendingPlace}</div>}
                      </div>
                      <div style={S.photoX} onClick={()=>{setImage(null); pendingGeoRef.current=null; setPendingPlace("");}}>✕</div>
                    </div>
                  )}
                  {error && <div style={S.error}>{error}</div>}
                  <div style={S.sheetBtns}>
                    <button style={S.btnGhost} onClick={()=>setSheet(false)} disabled={busy}>やめる</button>
                    <button style={{...S.btnMain, ...(busy||(!input.trim()&&!image)?{opacity:0.5}:{})}}
                      onClick={()=>analyze(input, image)} disabled={busy||(!input.trim()&&!image)}>
                      {busy ? "AIが読み取り中…" : "AIにまかせる →"}
                    </button>
                  </div>
                  <div style={S.samples}>
                    <div style={S.samplesLabel}>試しに放り込む（テキスト）：</div>
                    {[
                      "7月3日19時からオンライン勉強会。AI活用がテーマ。",
                      "G-SHOCK GW-B5600 楽天で28,600円。黒のやつ欲しい",
                      "来週金曜までに資料作る",
                      "https://note.com/ AIで業務自動化する方法まとめ"
                    ].map((s,i)=>(
                      <div key={i} style={S.sampleChip} onClick={()=>{setInput(s);}}>{s.slice(0,22)}…</div>
                    ))}
                  </div>
                </>
              ) : (
                <>
                  <div style={S.sheetTitle}>AIが読み取りました</div>
                  <div style={S.preview}>
                    <div style={{...S.previewHero, background:CATS[result.category].grad}}>
                      {(result._img || result.image) && <img src={result._img || result.image} alt="" style={S.previewImg} onError={e=>{e.target.style.display='none';}} />}
                      <span style={S.cardCat}>{CATS[result.category].label}</span>
                    </div>
                    <div style={{padding:"14px 16px 16px"}}>
                      <div style={S.cardTitle}>{result.title}</div>
                      {result.meta && <div style={S.cardMeta}>{result.meta}</div>}
                      {result.chip && <span style={{...S.cardChip, background:CATS[result.category].chip, color:CATS[result.category].chipC}}>{result.chip}</span>}
                    </div>
                  </div>
                  {(result.category==="event"||result.category==="task") && (
                    <>
                      <div style={S.fieldLabel}>
                        日付
                        {result.date
                          ? <span style={{marginLeft:6,fontSize:10,color:"#22c55e",fontWeight:700}}>✓ AIが読み取り済み</span>
                          : <span style={{marginLeft:6,fontSize:10,color:"#f59e0b"}}>日付が見つかりません — 手動で設定</span>
                        }
                      </div>
                      <input type="date" style={{...S.dateInput,...(result.date?{borderColor:"#22c55e"}:{})}}
                        value={resultDate} onChange={e=>setResultDate(e.target.value)} />
                    </>
                  )}
                  <div style={S.reclassLabel}>違ったら選び直す</div>
                  <div style={S.reclass}>
                    {Object.entries(CATS).map(([k,v])=>(
                      <div key={k} onClick={()=>setResult({...result, category:k})}
                        style={{...S.reclassChip, ...(k===result.category?{background:v.grad, color:"#fff", borderColor:"transparent"}:{})}}>
                        <span style={{...S.tabDot, background: k===result.category?"#fff":v.dot}}/>{v.label}
                      </div>
                    ))}
                  </div>
                  <div style={S.sheetBtns}>
                    <button style={S.btnGhost} onClick={()=>setResult(null)}>戻る</button>
                    <button style={S.btnMain} onClick={confirmAdd}>箱に入れる ✓</button>
                  </div>
                </>
              )}
            </div>
          </div>
        )}

        {/* 画像ライトボックス */}
        {lightbox && (
          <div style={S.lbWrap} onClick={()=>setLightbox(null)}>
            <img src={lightbox} alt="" style={S.lbImg} />
            <div style={S.lbClose}>✕</div>
          </div>
        )}

        {/* 設定シート */}
        {settings && (
          <div style={S.sheetWrap} onClick={()=>setSettings(false)}>
            <div style={S.sheet} onClick={e=>e.stopPropagation()}>
              <div style={S.sheetGrip}/>
              <div style={S.sheetTitle}>設定</div>
              <div style={S.sheetSub}>Anthropic（Claude）のAPIキーを貼り付けてください。キーはこの端末の中だけに保存されます。</div>
              <div style={S.fieldLabel}>APIキー（sk-ant-… で始まる文字列）</div>
              <textarea
                style={{...S.textarea, minHeight:64, fontFamily:"monospace", fontSize:12}}
                placeholder="sk-ant-..."
                value={keyDraft}
                onChange={e=>setKeyDraft(e.target.value)}
              />
              <div style={S.fieldLabel}>使うモデル</div>
              <select style={S.select} value={model} onChange={e=>setModel(e.target.value)}>
                <option value="claude-haiku-4-5-20251001">Haiku（速い・激安・おすすめ）</option>
                <option value="claude-sonnet-4-6">Sonnet（賢い・少し高い）</option>
              </select>
              <div style={S.help}>
                キーの取り方： <b>console.anthropic.com</b> に登録 → Billingで$5チャージ → API keys → Create Key
              </div>
              <div style={S.sheetBtns}>
                <button style={S.btnGhost} onClick={()=>setSettings(false)}>閉じる</button>
                <button style={S.btnMain} onClick={saveSettings}>保存する</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

const S = {
  bg: { minHeight:"100vh", minHeight:"100dvh", display:"flex", justifyContent:"center", alignItems:"flex-start", padding:"0",
    fontFamily:"'Inter',-apple-system,'Hiragino Sans',sans-serif" },
  phone: { width:"100%", maxWidth:440, minHeight:"100vh", minHeight:"100dvh", position:"relative", overflow:"hidden",
    background:"radial-gradient(circle at 25% 5%,rgba(255,180,210,0.32) 0%,transparent 36%),radial-gradient(circle at 90% 14%,rgba(150,190,255,0.30) 0%,transparent 40%),radial-gradient(circle at 50% 97%,rgba(255,200,140,0.26) 0%,transparent 40%),#f6f6f8" },
  sb: { height:44, display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 24px" },
  sbt: { fontSize:13, fontWeight:700, color:"#1a1a2e" }, sbi:{ fontSize:11, color:"#1a1a2e", letterSpacing:1 },
  hd: { padding:"6px 22px 12px", display:"flex", alignItems:"flex-end", justifyContent:"space-between" },
  hdName: { fontSize:26, fontWeight:900, color:"#16161e", letterSpacing:"-0.04em" },
  accent: { background:"linear-gradient(120deg,#ff6b9d,#a06bff,#56c4ff)", WebkitBackgroundClip:"text", backgroundClip:"text", WebkitTextFillColor:"transparent" },
  hdMonth: { fontSize:14, fontWeight:700, color:"#16161e" },
